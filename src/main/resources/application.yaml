spring:
  application:
    name: trading-simulator-backend
  datasource:
    url: jdbc:mysql://localhost:3306/trading_simulator
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

server:
  servlet:
    context-path: /api

